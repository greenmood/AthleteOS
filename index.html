// ── HELPERS ──────────────────────────────────────────────────────────────────

function getMesoForWeek(w) { return MESOS.find(m => m.weeks.includes(w)) || MESOS[0]; }
function getWorkoutsForWeek(w) { return WEEK_PLANS[w] || PLAN_WORKOUTS[getMesoForWeek(w).id]; }
function fmt(d) { return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"}); }

// Honest duration estimate:
//   Warmup: 5min
//   Cooldown: 10min (5 stretches × ~2min each)
//   Transitions/setup: 5min
//   Olympic sets: ramp singles = 5min/set (load + 3min rest), technique sets = 4min/set
//   Strength compound sets: 4min/set (work + 2-3min rest)
//   Conditioning EMOM: parse number from name = exact minutes
//   Conditioning AMRAP/For Time: parse number, else 15min; add 3min setup
//   Accessory isolation: 2min/set (45s work + 75s rest)
function estimateWorkoutDuration(workout) {
  let mins = 5 + 10 + 5; // warmup + cooldown + transitions

  (workout.exercises || []).forEach(ex => {
    const n = ex.name.toLowerCase();
    const s = ex.sets || 1;

    if (ex.muscle === "Conditioning") {
      const match = n.match(/\d+/);
      const wod = match ? parseInt(match[0]) : 15;
      mins += wod + 3; // workout + setup/rest
    } else if (ex.muscle === "Olympic") {
      // singles (ramp) cost more — plate changes, chalk, focus between sets
      mins += s * (ex.reps === 1 ? 5 : 4);
    } else {
      // strength compound: 4min/set
      mins += s * 4;
    }
  });

  // Accessories: 2min/set
  const acc = ACCESSORIES[workout.id] || [];
  acc.forEach(ex => { mins += (ex.sets || 3) * 2; });

  return Math.round(mins);
}

function durationLabel(mins) {
  const h = Math.floor(mins / 60), m = mins % 60;
  if (h === 0) return `~${m}min`;
  return m === 0 ? `~${h}h` : `~${h}h ${m}min`;
}

function durationColor(mins) {
  if (mins <= 90) return "#4ade80";
  if (mins <= 110) return "#facc15";
  return "#f87171"; // over 110min = pushing toward 2h limit
}

function useTimer(running) {
  const [elapsed, setElapsed] = useState(0);
  const startRef = useRef(null);   // wall-clock time when last resumed
  const baseRef  = useRef(0);      // accumulated seconds before last pause

  useEffect(() => {
    if (running) {
      startRef.current = Date.now();
      const id = setInterval(() => {
        setElapsed(baseRef.current + Math.floor((Date.now() - startRef.current) / 1000));
      }, 500); // poll every 500ms — snappy UI, low cost
      return () => clearInterval(id);
    } else {
      // Paused: snapshot current elapsed into base
      baseRef.current = elapsed;
    }
  }, [running]);

  const reset = () => { baseRef.current = 0; startRef.current = null; setElapsed(0); };
  const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
  const ss = String(elapsed % 60).padStart(2, "0");
  return { display: `${mm}:${ss}`, elapsed, reset };
}

function Sparkline({data,color="#00b4ff"}) {
  if (!data||data.length<2) return null;
  const W=120,H=36,p=4,min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts = data.map((v,i)=>`${p+(i/(data.length-1))*(W-p*2)},${H-p-((v-min)/range)*(H-p*2)}`).join(" ");
  const lx=p+((data.length-1)/(data.length-1))*(W-p*2), ly=H-p-((data[data.length-1]-min)/range)*(H-p*2);
  return <svg width={W} height={H} style={{overflow:"visible"}}><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/><circle cx={lx} cy={ly} r="3" fill={color}/></svg>;
}

// EMOM: checklist per interval + pace note
function EmomTemplate({ ex, log, setLog, meso }) {
  const intervals = ex.sets || 10;
  const checked = log.intervals || [];
  const note = log.note || "";
  const toggle = (i) => {
    const next = checked.includes(i) ? checked.filter(x=>x!==i) : [...checked,i];
    setLog({ ...log, intervals: next });
  };
  return (
    <ExCard ex={ex} meso={meso}>
      <div style={{fontFamily:"Barlow Condensed",fontSize:11,color:"#888",letterSpacing:1,marginBottom:8}}>TAP EACH INTERVAL AS COMPLETED</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
        {Array.from({length:intervals},(_,i)=>{
          const done = checked.includes(i);
          return (
            <button key={i} onClick={()=>toggle(i)} style={{
              width:36,height:36,borderRadius:8,border:`1px solid ${done?meso.color+"88":"#2a2a3e"}`,
              background:done?`${meso.color}22`:"#13131f",color:done?meso.color:"#555",
              fontFamily:"Barlow Condensed",fontWeight:700,fontSize:12,cursor:"pointer"
            }}>{i+1}</button>
          );
        })}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{fontSize:10,color:"#555",fontFamily:"Barlow Condensed",whiteSpace:"nowrap"}}>{checked.length}/{intervals} done</div>
        <input value={note} onChange={e=>setLog({...log,note:e.target.value})} placeholder="Pace notes — e.g. held pace, dropped at min 9..." style={{flex:1,background:"#13131f",border:"1px solid #2a2a3e",borderRadius:6,color:"#ccc",fontSize:11,fontFamily:"Barlow",padding:"6px 8px",outline:"none",boxSizing:"border-box"}}/>
      </div>
    </ExCard>
  );
}

// RAMP: per-set rows with weight + reps (build to max)
function RampTemplate({ ex, log, setLog, meso }) {
  const rows = log.rows || Array.from({length: Math.max(ex.sets||3, 3)}, ()=>({w:"",r:"",done:false}));
  const update = (i, field, val) => {
    const next = rows.map((r,ri) => ri===i ? {...r,[field]:val} : r);
    setLog({...log, rows: next});
  };
  const toggleDone = (i) => {
    const next = rows.map((r,ri) => ri===i ? {...r,done:!r.done} : r);
    setLog({...log, rows: next});
  };
  const addRow = () => setLog({...log, rows:[...rows,{w:"",r:"",done:false}]});
  return (
    <ExCard ex={ex} meso={meso}>
      <div style={{display:"grid",gridTemplateColumns:"24px 80px 80px 26px",gap:6,marginBottom:6}}>
        {["Set","kg","Reps",""].map(h=><div key={h} style={{fontSize:9,color:"#444",fontFamily:"Barlow Condensed",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{h}</div>)}
      </div>
      {rows.map((r,i)=>(
        <div key={i} style={{display:"grid",gridTemplateColumns:"24px 80px 80px 26px",gap:6,marginBottom:6,opacity:r.done?0.6:1}}>
          <div style={{fontFamily:"Barlow Condensed",fontWeight:700,fontSize:12,color:r.done?meso.color:"#555",display:"flex",alignItems:"center"}}>{i+1}</div>
          <input type="number" inputMode="decimal" value={r.w} onChange={e=>update(i,"w",e.target.value)} placeholder="kg" style={{background:r.done?"#0a0f1a":"#13131f",border:`1px solid ${r.done?meso.color+"55":"#2a2a3e"}`,borderRadius:6,color:"#fff",fontSize:14,fontFamily:"Barlow Condensed",fontWeight:700,padding:"6px",textAlign:"center",outline:"none",boxSizing:"border-box"}}/>
          <input type="number" inputMode="numeric" value={r.r} onChange={e=>update(i,"r",e.target.value)} placeholder="reps" style={{background:r.done?"#0a0f1a":"#13131f",border:`1px solid ${r.done?meso.color+"55":"#2a2a3e"}`,borderRadius:6,color:"#fff",fontSize:14,fontFamily:"Barlow Condensed",fontWeight:700,padding:"6px",textAlign:"center",outline:"none",boxSizing:"border-box"}}/>
          <button onClick={()=>toggleDone(i)} style={{background:r.done?meso.color:"#1a1a2e",border:"none",borderRadius:6,width:26,height:26,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",color:r.done?"#000":"#555"}}>{r.done?"✓":"○"}</button>
        </div>
      ))}
      <button onClick={addRow} style={{marginTop:2,background:"transparent",border:"1px dashed #2a2a3e",borderRadius:6,color:"#444",fontSize:10,fontFamily:"Barlow Condensed",fontWeight:700,letterSpacing:1,padding:"4px 12px",cursor:"pointer",width:"100%"}}>+ ADD SET</button>
    </ExCard>
  );
}

function ExerciseLogger({ ex, log, setLog, meso }) {
  const type = ex.type || (ex.muscle === "Conditioning" ? "amrap" : "fixed");
  if (type === "emom")    return <EmomTemplate   ex={ex} log={log} setLog={setLog} meso={meso}/>;
  if (type === "amrap")   return <AmrapTemplate  ex={ex} log={log} setLog={setLog} meso={meso}/>;
  if (type === "fortime") return <ForTimeTemplate ex={ex} log={log} setLog={setLog} meso={meso}/>;
  if (type === "fixed")   return <FixedTemplate  ex={ex} log={log} setLog={setLog} meso={meso}/>;
  return                         <RampTemplate   ex={ex} log={log} setLog={setLog} meso={meso}/>;
}

// ── LOG NORMALIZER ────────────────────────────────────────────────────────────
// Produces a saved shape with `sets` (array — length is the meaningful count
// for HistoryScreen) and `prescribedSets` (number — used by week export).
function normalizeExerciseLog(ex, log) {
  const l = log || {};
  let summary = "", sets = [];
  if (ex.type === "emom") {
    const n = (l.intervals||[]).length;
    summary = `${n}/${ex.sets} intervals${l.note?` — ${l.note}`:""}`;
    sets = Array.from({length:n}, (_,i) => ({interval:i+1}));
  } else if (ex.type === "amrap") {
    const r = Number(l.rounds)||0, rp = Number(l.reps)||0;
    summary = `${r}+${rp} reps${l.note?` — ${l.note}`:""}`;
    sets = (r||rp) ? [{rounds:r, reps:rp}] : [];
  } else if (ex.type === "fortime") {
    summary = `${l.mm||"0"}:${String(l.ss||"0").padStart(2,"0")}${l.note?` — ${l.note}`:""}`;
    sets = (l.mm||l.ss) ? [{mm:l.mm||"0", ss:l.ss||"0"}] : [];
  } else if (ex.type === "fixed") {
    const done = (l.checked||[]).length;
    const w = Number(l.weight)||0;
    summary = `${done}/${ex.sets}sets @${l.weight||"?"}kg`;
    sets = Array.from({length:done}, () => ({w, r:ex.reps}));
  } else { // ramp
    const rows = (l.rows||[]).filter(r => r.w !== "" && r.w != null);
    summary = rows.map(r => `${r.w}kg×${r.r}`).join(", ");
    sets = rows.map(r => ({w:Number(r.w)||0, r:Number(r.r)||0, done:!!r.done}));
  }
  return { summary, sets, prescribedSets: ex.sets };
}

// ── WORKOUT SCREEN ────────────────────────────────────────────────────────────

function WorkoutScreen({initialWorkout,onSave,currentWeek}) {
  const today=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"long"});
  const [activeWorkout,setActiveWorkout]=useState(initialWorkout||null);
  const [started,setStarted]=useState(!!initialWorkout);
  const [paused,setPaused]=useState(false);
  const [exercises,setExercises]=useState(initialWorkout?.exercises||[]);
  const [logs,setLogs]=useState({});
  const [accLogs,setAccLogs]=useState({});
  const [showPicker,setShowPicker]=useState(false);
  const [confirmDiscard,setConfirmDiscard]=useState(false);
  const timer=useTimer(started && !paused);
  const meso=getMesoForWeek(currentWeek);
  const weekWorkouts=getWorkoutsForWeek(currentWeek);

  useEffect(()=>{
    if(initialWorkout){setActiveWorkout(initialWorkout);setExercises(initialWorkout.exercises);setStarted(true);setPaused(false);setLogs({});setAccLogs({});setConfirmDiscard(false);}
  },[initialWorkout]);

  const setLog=(name,val)=>setLogs(l=>({...l,[name]:val}));
  const setAccLog=(name,val)=>setAccLogs(l=>({...l,[name]:val}));

  const finish=()=>{
    const exSummary=exercises.map(ex=>{
      const log=logs[ex.name]||{};
      const norm=normalizeExerciseLog(ex, log);
      return {name:ex.name, type:ex.type, summary:norm.summary, sets:norm.sets, prescribedSets:norm.prescribedSets, rawLog:log};
    });
    const accSummary=(ACCESSORIES[activeWorkout?.id]||[]).map(ex=>{
      const log=accLogs[ex.name]||{};
      const done=(log.checked||[]).length;
      const w=Number(log.weight)||0;
      return {
        name:ex.name, type:"accessory",
        summary:`${done}/${ex.sets}sets @${log.weight||"?"}kg`,
        sets:Array.from({length:done}, () => ({w, r:ex.reps})),
        prescribedSets:ex.sets,
        rawLog:log
      };
    });
    onSave({
      id:`h${Date.now()}`,dayId:activeWorkout?.id,week:currentWeek,
      date:new Date().toISOString().split("T")[0],
      duration:Math.floor(timer.elapsed/60),
      exercises:exSummary,
      accessories:accSummary,
      prs:[]
    });
    setStarted(false);setPaused(false);setActiveWorkout(null);setExercises([]);setLogs({});setAccLogs({});setConfirmDiscard(false);timer.reset();
  };
  const discard=()=>{setStarted(false);setPaused(false);setActiveWorkout(null);setExercises([]);setLogs({});setAccLogs({});setConfirmDiscard(false);timer.reset();};

  if(!activeWorkout) return (
    <div style={{padding:"0 16px 100px"}}>
      <div style={{fontFamily:"Barlow Condensed",fontSize:11,color:meso.color,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>W{currentWeek} — {meso.name}</div>
      <div style={{color:"#666",fontSize:13,marginBottom:20}}>Select a workout to begin.</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {weekWorkouts.map(w=>(
          <button key={w.id} onClick={()=>{setActiveWorkout(w);setExercises(w.exercises);setStarted(true);}} style={{background:"#0f0f1a",border:"1px solid #1e1e30",borderRadius:12,padding:14,textAlign:"left",cursor:"pointer"}}>
            <div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:700,color:meso.color,letterSpacing:2,textTransform:"uppercase"}}>{w.id}</div>
            <div style={{fontFamily:"Barlow Condensed",fontSize:14,fontWeight:700,color:"#fff"}}>{w.name.split("—")[1]?.trim()}</div>
            <div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:700,color:durationColor(estimateWorkoutDuration(w)),marginTop:6}}>⏱ {durationLabel(estimateWorkoutDuration(w))}</div>
          </button>
        ))}
      </div>
    </div>
  );

  const estMins=estimateWorkoutDuration(activeWorkout);
  const elapsedMins=Math.floor(timer.elapsed/60);
  const remainMins=Math.max(0,estMins-elapsedMins);
  const pct=Math.min(100,(elapsedMins/estMins)*100);
  const overTime=elapsedMins>estMins;

  return (
    <div style={{padding:"0 16px 120px"}}>
      {/* Header */}
      <div style={{marginBottom:10}}>
        <div style={{fontFamily:"Barlow Condensed",fontSize:10,color:meso.color,letterSpacing:2,textTransform:"uppercase"}}>{today}</div>
        <div style={{fontFamily:"Barlow Condensed",fontSize:18,fontWeight:900,color:"#fff",lineHeight:1.1,marginBottom:8}}>{activeWorkout.name}</div>

        {/* Timer + controls row */}
        <div style={{background:"#0f0f1a",border:`1px solid ${paused?"#facc1544":"#1e1e30"}`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          {/* Big timer */}
          <div style={{fontFamily:"Barlow Condensed",fontSize:38,fontWeight:900,color:paused?"#facc15":meso.color,lineHeight:1,minWidth:90,transition:"color 0.2s"}}>
            {timer.display}
          </div>
          {paused&&<div style={{fontFamily:"Barlow Condensed",fontSize:10,fontWeight:700,color:"#facc15",letterSpacing:2,textTransform:"uppercase",flex:1}}>PAUSED</div>}
          {!paused&&<div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontFamily:"Barlow Condensed",fontSize:10,color:overTime?"#f87171":"#888"}}>{overTime?`+${elapsedMins-estMins}min over`:`${remainMins}min left`}</span>
              <span style={{fontFamily:"Barlow Condensed",fontSize:10,color:durationColor(estMins)}}>⏱ {durationLabel(estMins)}</span>
            </div>
            <div style={{height:3,background:"#1a1a2e",borderRadius:2,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:overTime?"#f87171":meso.color,borderRadius:2}}/>
            </div>
          </div>}
          {/* Pause / Resume button */}
          <button onClick={()=>setPaused(p=>!p)} style={{
            background:paused?`linear-gradient(135deg,#facc15,#f59e0b)`:"#1a1a2e",
            border:`1px solid ${paused?"#facc15":"#2a2a3e"}`,
            borderRadius:10,width:44,height:44,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0
          }}>{paused?"▶":"⏸"}</button>
        </div>

        {/* Finish / Discard row */}
        {!confirmDiscard ? (
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:8}}>
            <button onClick={()=>setConfirmDiscard(true)} style={{background:"transparent",border:"1px solid #2a2a3e",borderRadius:10,color:"#555",fontFamily:"Barlow Condensed",fontSize:11,fontWeight:700,letterSpacing:2,padding:"10px",cursor:"pointer"}}>DISCARD</button>
            <button onClick={finish} style={{background:`linear-gradient(135deg,${meso.color},${meso.color}99)`,border:"none",borderRadius:10,color:"#fff",fontFamily:"Barlow Condensed",fontSize:11,fontWeight:800,letterSpacing:2,padding:"10px",cursor:"pointer"}}>FINISH WORKOUT ✓</button>
          </div>
        ) : (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <button onClick={()=>setConfirmDiscard(false)} style={{background:"#1a1a2e",border:"1px solid #2a2a3e",borderRadius:10,color:"#ccc",fontFamily:"Barlow Condensed",fontSize:11,fontWeight:700,letterSpacing:2,padding:"10px",cursor:"pointer"}}>CANCEL</button>
            <button onClick={discard} style={{background:"#f87171",border:"none",borderRadius:10,color:"#fff",fontFamily:"Barlow Condensed",fontSize:11,fontWeight:800,letterSpacing:2,padding:"10px",cursor:"pointer"}}>CONFIRM DISCARD</button>
          </div>
        )}
      </div>

      {/* Warmup */}
      <div style={{background:"#0f0f1a",border:"1px solid #1e1e30",borderRadius:12,padding:"10px 14px",marginBottom:10}}>
        <div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:700,color:"#facc15",letterSpacing:2,textTransform:"uppercase",marginBottom:5}}>⚡ Warmup — 5 min</div>
        {["Easy bike or row","Hip circles × 10","Leg swings × 10/side","Shoulder pass-throughs × 10","PVC OHS × 10"].map(w=><div key={w} style={{fontSize:11,color:"#555",padding:"2px 0"}}>• {w}</div>)}
      </div>

      {/* Type-aware exercise templates */}
      {exercises.map(ex=>(
        <ExerciseLogger key={ex.name} ex={ex} log={logs[ex.name]||{}} setLog={v=>setLog(ex.name,v)} meso={meso}/>
      ))}

      {/* Add exercise */}
      <button onClick={()=>setShowPicker(p=>!p)} style={{width:"100%",background:"transparent",border:`1px dashed ${meso.color}55`,borderRadius:12,color:meso.color,fontSize:11,fontFamily:"Barlow Condensed",fontWeight:700,letterSpacing:2,padding:10,cursor:"pointer",marginBottom:10}}>+ ADD EXERCISE</button>
      {showPicker&&(
        <div style={{background:"#0f0f1a",border:"1px solid #1e1e30",borderRadius:12,padding:12,marginBottom:10}}>
          {[
            {name:"Back Squat",type:"ramp",muscle:"Quads",sets:4,reps:5},
            {name:"Snatch",type:"ramp",muscle:"Olympic",sets:5,reps:1},
            {name:"OHS",type:"fixed",muscle:"Quads",sets:3,reps:5},
            {name:"Ring Dips",type:"fixed",muscle:"Chest",sets:3,reps:10},
            {name:"HSPU",type:"fixed",muscle:"Shoulders",sets:3,reps:8},
            {name:"GHD Situp",type:"fixed",muscle:"Core",sets:3,reps:15},
            {name:"Box Jump",type:"fixed",muscle:"Legs",sets:4,reps:10},
            {name:"KB Swing",type:"fixed",muscle:"Posterior Chain",sets:3,reps:20},
            {name:"AMRAP 10",type:"amrap",muscle:"Conditioning",sets:1,reps:null},
            {name:"EMOM 10",type:"emom",muscle:"Conditioning",sets:10,reps:null},
          ].map(e=>(
            <button key={e.name} onClick={()=>{setExercises(ex=>[...ex,e]);setShowPicker(false);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",background:"transparent",border:"none",color:"#ccc",fontSize:13,fontFamily:"Barlow Condensed",fontWeight:600,padding:"7px 0",cursor:"pointer",textAlign:"left",borderBottom:"1px solid #1a1a2e"}}>
              <span>{e.name}</span>
              <span style={{fontSize:9,color:({ramp:"#00b4ff",fixed:"#4ade80",amrap:"#f97316",emom:"#facc15",fortime:"#f43f5e"})[e.type],fontFamily:"Barlow Condensed",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{e.type}</span>
            </button>
          ))}
        </div>
      )}

      {/* Accessory block */}
      {ACCESSORIES[activeWorkout?.id]&&(
        <div style={{background:"#0f0f1a",border:"1px solid #2a1a3e",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
          <div style={{fontFamily:"Barlow Condensed",fontSize:11,fontWeight:700,color:"#a855f7",letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>
            💪 Accessory — ~{ACCESSORIES[activeWorkout.id].reduce((a,e)=>a+e.sets*2,0)} min
          </div>
          <div style={{fontSize:10,color:"#555",marginBottom:10}}>Isolation. 2min/set incl. rest. Don't skip.</div>
          {ACCESSORIES[activeWorkout.id].map(ex=>(
            <AccessoryLogger key={ex.name} ex={ex} log={accLogs[ex.name]||{}} setLog={v=>setAccLog(ex.name,v)}/>
          ))}
        </div>
      )}

      {/* Cooldown */}

// ── WEEK EXPORT GENERATOR ─────────────────────────────────────────────────────

function generateWeekExport(history, week) {
  const sessions = history.filter(h => h.week === week);
  if (!sessions.length) return `No sessions logged for W${week}.`;

  const allWorkouts = Object.values(PLAN_WORKOUTS).flat();
  const meso = getMesoForWeek(week);

  let out = `=== W${week} TRAINING LOG — ${meso.name.toUpperCase()} ===\n`;
  out += `Mesocycle ${meso.id} of 4 · ${sessions.length} sessions logged\n\n`;

  sessions.forEach(h => {
    const workout = allWorkouts.find(w => w.id === h.dayId);
    out += `── ${h.dayId}: ${workout?.name || "Workout"} · ${h.date} · ${h.duration}min ──\n`;

    (h.exercises || []).forEach(ex => {
      const l = ex.rawLog || {};
      out += `  ${ex.name}`;
      if (ex.type === "ramp") {
        const rows = (l.rows || []).filter(r => r.w);
        if (rows.length) out += `: ${rows.map(r=>`${r.w}kg×${r.r}`).join(" / ")}`;
        else out += `: ${ex.summary || "not logged"}`;
      } else if (ex.type === "fixed") {
        out += `: ${(l.checked||[]).length}/${ex.prescribedSets||"?"} sets @ ${l.weight||"?"}kg`;
      } else if (ex.type === "emom") {
        out += `: ${(l.intervals||[]).length} intervals completed`;
        if (l.note) out += ` — "${l.note}"`;
      } else if (ex.type === "amrap") {
        out += `: ${l.rounds||0} rounds + ${l.reps||0} reps`;
        if (l.note) out += ` — "${l.note}"`;
      } else if (ex.type === "fortime") {
        out += `: ${l.mm||"?"}:${String(l.ss||"0").padStart(2,"0")}`;
        if (l.note) out += ` — "${l.note}"`;
      } else {
        out += `: ${ex.summary || "not logged"}`;
      }
      out += "\n";
    });

    if (h.accessories?.length) {
      out += `  [Accessories]\n`;
      h.accessories.forEach(acc => {
        const l = acc.rawLog || {};
        const sets = (l.checked||[]).length;
        const w = l.weight;
        out += `    ${acc.name}: ${sets} sets${w ? ` @ ${w}kg` : ""}\n`;
      });
    }
    out += "\n";
  });

  out += `=== PASTE THIS TO CLAUDE FOR W${week+1} PROGRESSION ===`;
  return out;
}

    const text = generateWeekExport(history, exportWeek);
    setExportText(text);
    setCopied(false);

  const handleCopy = () => {
    navigator.clipboard.writeText(exportText).then(() => {
      setCopied(true);

  const handleBackup = () => {
    const payload = JSON.stringify({version:1, exportedAt:new Date().toISOString(), history}, null, 2);
    const blob = new Blob([payload], {type:"application/json"});
    const url = URL.createObjectURL(blob);

    a.download = `athleteos-history-${new Date().toISOString().split("T")[0]}.json`;

// ── STORAGE (IndexedDB) ──────────────────────────────────────────────────────
// One object store keyed by session id, with cheap indexes on week + date.
// On first run we migrate the legacy localStorage blob (or seed DEMO_HISTORY)
// and set INIT_FLAG so we never reseed after the user has emptied their log.

const DB_NAME   = "athleteos";
const STORE     = "sessions";
const LEGACY_KEY = "athleteos-history-v1";
const INIT_FLAG  = "athleteos-initialized-v1";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: "id" });
        store.createIndex("week", "week");
        store.createIndex("date", "date");
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

async function idbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror   = () => reject(req.error);
  });
}

async function idbPut(session) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(session);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

async function idbDelete(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

async function idbBulkPut(sessions) {
  if (!sessions.length) return;
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    const store = tx.objectStore(STORE);
    sessions.forEach(s => store.put(s));
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

const byDateDesc = (a, b) => (b.date || "").localeCompare(a.date || "");

async function initStorage() {
  let sessions = [];
  try { sessions = await idbGetAll(); }
  catch (e) { console.warn("IDB load failed:", e); }

  // First-run only: migrate legacy localStorage OR seed demo
  if (sessions.length === 0 && !localStorage.getItem(INIT_FLAG)) {
    const raw = localStorage.getItem(LEGACY_KEY);
    const hadLegacy = raw !== null;
    let migrated = [];
    if (hadLegacy) { try { migrated = JSON.parse(raw); } catch {} }
    const seed = hadLegacy
      ? (Array.isArray(migrated) ? migrated : [])
      : DEMO_HISTORY;
    try { await idbBulkPut(seed); sessions = seed; }
    catch (e) { console.warn("IDB seed failed:", e); sessions = seed; }
    localStorage.setItem(INIT_FLAG, "1");
    localStorage.removeItem(LEGACY_KEY);
  }

  // Ask the browser not to evict our data. Best-effort, no-op on iOS today.
  if (navigator.storage?.persist) navigator.storage.persist().catch(() => {});

  return sessions.sort(byDateDesc);
}

      )}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(8,8,16,0.97)",backdropFilter:"blur(16px)",borderTop:"1px solid #1e1e30",display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",padding:"7px 0 env(safe-area-inset-bottom,7px)",zIndex:100}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"3px 0"}}>
            <div style={{fontSize:17,lineHeight:1,filter:tab===n.id?"none":"grayscale(1) opacity(0.3)"}}>{n.icon}</div>
            <div style={{fontFamily:"Barlow Condensed",fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:tab===n.id?meso.color:"#444",transition:"color 0.2s"}}>{n.label}</div>
            {tab===n.id&&<div style={{width:14,height:2,background:meso.color,borderRadius:1}}/>}
          </button>
        ))}
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));

    // Register service worker — reload once when a new SW takes control so a
    // fresh deploy doesn't leave a stale app shell on screen.
    if ('serviceWorker' in navigator) {
      let reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloading) return;
        reloading = true;
        window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(r => console.log('SW registered'))
          .catch(e => console.log('SW failed:', e));
      });
    }
  </script>
</body>
</html>
